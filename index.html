    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    /* ============================================================
       TEMA CLARO (padrão)
       ============================================================ */
    :root {
      --bg-grad:        linear-gradient(165deg, #fbeee6 0%, #f6e2d7 45%, #f0d6c8 100%);
      --bg-radial:      radial-gradient(1200px 600px at 50% -10%, #fcefe6 0%, rgba(252,239,230,0) 60%);

      --card-bg:        linear-gradient(180deg, rgba(255,255,255,0.92) 0%, rgba(255,253,251,0.96) 100%);
      --card-border:    rgba(255, 255, 255, 0.7);

      --button-bg:      #fffdfb;
      --button-border:  rgba(140, 90, 68, 0.10);
      --button-hover:   rgba(191, 138, 112, 0.35);

      --featured-grad:  linear-gradient(135deg, #f7e2d2 0%, #f1cfb9 55%, #ecc4ab 100%);
      --featured-border:rgba(168, 113, 89, 0.30);
      --featured-shine: rgba(255, 255, 255, 0.55);

      --social-bg:      #f9efe7;
      --social-border:  rgba(140, 90, 68, 0.08);
      --social-bg-hover:#fffdfb;

      --blob-1: #f3c9b4;
      --blob-2: #e9bfa9;
      --blob-3: #f7d9c8;
      --blob-opacity: 0.5;

      --text-primary:   #43302a;
      --text-secondary: #8a7065;
      --text-accent:    #8c5a44;

      --rose:           #bf8a70;
      --rose-deep:      #a87159;
      --copper:         #8c5a44;

      --toggle-border:  rgba(140, 90, 68, 0.15);

      --shadow-sm:      0 2px 10px rgba(140, 90, 68, 0.08);
      --shadow-md:      0 10px 30px rgba(140, 90, 68, 0.14);
      --shadow-lg:      0 18px 50px rgba(140, 90, 68, 0.18);

      --radius: 18px;
    }

    /* ============================================================
       TEMA ESCURO (chocolate à noite, com acentos rosé/cobre)
       ============================================================ */
    [data-theme="dark"] {
      --bg-grad:        linear-gradient(165deg, #1c130f 0%, #241812 45%, #2a1c16 100%);
      --bg-radial:      radial-gradient(1200px 600px at 50% -10%, #321f17 0%, rgba(50,31,23,0) 60%);

      --card-bg:        linear-gradient(180deg, rgba(50, 33, 27, 0.85) 0%, rgba(55, 37, 30, 0.92) 100%);
      --card-border:    rgba(100, 70, 55, 0.35);

      --button-bg:      #3a261f;
      --button-border:  rgba(232, 184, 156, 0.12);
      --button-hover:   rgba(232, 184, 156, 0.40);

      --featured-grad:  linear-gradient(135deg, #5a3a2b 0%, #6f4938 55%, #56362a 100%);
      --featured-border:rgba(232, 184, 156, 0.30);
      --featured-shine: rgba(255, 220, 195, 0.18);

      --social-bg:      #3a261f;
      --social-border:  rgba(232, 184, 156, 0.10);
      --social-bg-hover:#48302a;

      --blob-1: #3a1f17;
      --blob-2: #2d1812;
      --blob-3: #4a2a20;
      --blob-opacity: 0.55;

      --text-primary:   #f4e6dc;
      --text-secondary: #c5ad9f;
      --text-accent:    #e8b89c;

      --rose:           #d99c80;
      --rose-deep:      #c8896f;
      --copper:         #e8b89c;

      --toggle-border:  rgba(232, 184, 156, 0.20);

      --shadow-sm:      0 2px 10px rgba(0, 0, 0, 0.4);
      --shadow-md:      0 10px 30px rgba(0, 0, 0, 0.5);
      --shadow-lg:      0 18px 50px rgba(0, 0, 0, 0.6);
    }

    html, body { min-height: 100%; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: var(--text-primary);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px 18px;
      -webkit-font-smoothing: antialiased;
      position: relative;
      overflow-x: hidden;
      background: var(--bg-radial), var(--bg-grad);
      transition: background 0.5s ease, color 0.5s ease;
    }

    /* Manchas suaves de cor ao fundo */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(70px);
      opacity: var(--blob-opacity);
      z-index: 0;
      pointer-events: none;
      transition: background 0.5s ease, opacity 0.5s ease;
    }
    .blob.one  { width: 320px; height: 320px; top: -80px; left: -90px;  background: var(--blob-1); }
    .blob.two  { width: 360px; height: 360px; bottom: -120px; right: -110px; background: var(--blob-2); }
    .blob.three{ width: 240px; height: 240px; top: 40%; right: -80px; background: var(--blob-3); opacity: calc(var(--blob-opacity) * 0.8); }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
      background: var(--card-bg);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid var(--card-border);
      border-radius: 30px;
      padding: 38px 26px 30px;
      box-shadow: var(--shadow-lg);
      transition: background 0.5s ease, border-color 0.5s ease, box-shadow 0.5s ease;
    }

    /* ---------- Botão de tema (sol/lua) ---------- */
    .theme-toggle {
      position: absolute;
      top: 14px;
      right: 14px;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 1px solid var(--toggle-border);
      background: var(--button-bg);
      color: var(--text-accent);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      padding: 0;
      box-shadow: var(--shadow-sm);
      transition: background 0.3s ease, color 0.3s ease, border-color 0.3s ease, transform 0.15s ease;
    }
    .theme-toggle:hover { transform: scale(1.08); }
    .theme-toggle:active { transform: scale(0.94); }
    .theme-toggle:focus-visible {
      outline: 3px solid var(--rose);
      outline-offset: 2px;
    }
    .theme-toggle svg {
      position: absolute;
      width: 18px;
      height: 18px;
      transition: opacity 0.4s ease, transform 0.4s ease;
    }
    .theme-toggle .icon-sun  { opacity: 0; transform: rotate(-90deg) scale(0.5); }
    .theme-toggle .icon-moon { opacity: 1; transform: rotate(0deg) scale(1); }
    [data-theme="dark"] .theme-toggle .icon-sun  { opacity: 1; transform: rotate(0deg) scale(1); }
    [data-theme="dark"] .theme-toggle .icon-moon { opacity: 0; transform: rotate(90deg) scale(0.5); }

    /* ---------- Cabeçalho ---------- */
    .logo-wrapper {
      display: flex;
      justify-content: center;
      margin-bottom: 18px;
    }
    .logo-ring {
      position: relative;
      width: 132px;
      height: 132px;
      border-radius: 50%;
      padding: 5px;
      background: conic-gradient(from 200deg, #eccbbb, #bf8a70, #f4ddd1, #d3a18b, #eccbbb);
      box-shadow: var(--shadow-md);
    }
    .logo {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      background: #fffdfb;
      display: block;
    }

    .title {
      text-align: center;
      font-family: 'Playfair Display', Georgia, serif;
      font-weight: 700;
      font-size: 30px;
      line-height: 1.15;
      letter-spacing: -0.2px;
      margin-bottom: 8px;
      background: linear-gradient(100deg, var(--copper), var(--rose) 55%, var(--rose-deep));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      transition: background 0.5s ease;
    }

    .location {
      text-align: center;
      font-size: 15px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 20px;
      transition: color 0.5s ease;
    }

    .socials {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 26px;
    }
    .socials a {
      width: 42px;
      height: 42px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      color: var(--text-accent);
      background: var(--social-bg);
      border: 1px solid var(--social-border);
      transition: transform 0.18s ease, background 0.3s ease, color 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
    }
    .socials a:hover {
      transform: translateY(-2px);
      background: var(--social-bg-hover);
      color: var(--rose-deep);
      box-shadow: var(--shadow-sm);
    }

    /* ---------- Links ---------- */
    .links {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .link-button {
      position: relative;
      display: flex;
      align-items: center;
      background: var(--button-bg);
      border: 1px solid var(--button-border);
      border-radius: var(--radius);
      padding: 17px 18px;
      text-decoration: none;
      color: var(--text-primary);
      font-size: 16px;
      font-weight: 600;
      box-shadow: var(--shadow-sm);
      transition: transform 0.18s ease, background 0.3s ease, color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
      overflow: hidden;
    }
    .link-button:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-md);
      border-color: var(--button-hover);
    }
    .link-button:focus-visible {
      outline: 3px solid var(--rose);
      outline-offset: 2px;
    }

    .link-button .icon {
      flex-shrink: 0;
      width: 26px;
      height: 26px;
      color: var(--rose-deep);
      transition: color 0.3s ease;
    }
    .link-button .label {
      flex: 1;
      text-align: center;
      padding: 0 4px;
    }
    .link-button .spacer { width: 22px; flex-shrink: 0; }

    /* ---------- Botão em destaque: Festival (tempo limitado) ---------- */
    .link-button.featured {
      background: var(--featured-grad);
      border: 1px solid var(--featured-border);
      color: var(--text-accent);
      padding-top: 31px;
    }
    .link-button.featured .icon { color: var(--text-accent); }
    .link-button.featured:hover { border-color: var(--button-hover); }

    /* Brilho que cruza o botão de tempos em tempos */
    .link-button.featured::after {
      content: "";
      position: absolute;
      top: 0;
      left: -60%;
      width: 50%;
      height: 100%;
      background: linear-gradient(100deg, transparent, var(--featured-shine), transparent);
      transform: skewX(-18deg);
      animation: shine 4.5s ease-in-out infinite;
    }

    .badge {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      font-size: 9.5px;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: #fffdfb;
      background: linear-gradient(100deg, #a87159, #8c5a44);
      padding: 4px 12px;
      border-radius: 0 0 10px 10px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.25);
    }
    .badge .dot {
      display: inline-block;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #ffe9dd;
      margin-right: 5px;
      vertical-align: middle;
      animation: pulse 1.8s ease-in-out infinite;
    }

    @keyframes shine {
      0%, 60% { left: -60%; }
      100% { left: 130%; }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.35; transform: scale(0.75); }
    }

    .footer {
      text-align: center;
      margin-top: 26px;
      font-size: 12px;
      color: var(--text-secondary);
      opacity: 0.75;
      transition: color 0.5s ease;
    }

    /* ---------- Responsivo ---------- */
    @media (min-width: 600px) {
      .container { max-width: 460px; padding: 42px 32px 34px; }
      .title { font-size: 33px; }
    }
    @media (min-width: 1024px) {
      body { padding: 40px; }
      .container { max-width: 470px; }
      .blob.one { width: 420px; height: 420px; }
      .blob.two { width: 460px; height: 460px; }
    }
    @media (max-width: 380px) {
      .container { padding: 30px 18px 24px; border-radius: 26px; }
      .title { font-size: 27px; }
      .logo-ring { width: 116px; height: 116px; }
      .link-button { padding: 16px; font-size: 15px; }
      .theme-toggle { top: 10px; right: 10px; width: 34px; height: 34px; }
    }

    /* Acessibilidade: respeita quem prefere menos animação */
    @media (prefers-reduced-motion: reduce) {
      .link-button.featured::after { animation: none; display: none; }
      .badge .dot { animation: none; }
      .link-button, .socials a, .theme-toggle, .theme-toggle svg,
      body, .container, .title, .location, .footer, .blob { transition: none; }
    }
  </style>
</head>

  <script>
    (function() {
      var btn = document.getElementById('themeToggle');
      var meta = document.getElementById('theme-color-meta');
      var themeColors = { light: '#f6e3d8', dark: '#1c130f' };

      // Atualiza a cor da barra do navegador (Safari/iOS, Chrome Android)
      function updateMeta(theme) {
        if (meta) meta.setAttribute('content', themeColors[theme] || themeColors.light);
      }
      updateMeta(document.documentElement.getAttribute('data-theme') || 'light');

      btn.addEventListener('click', function() {
        var current = document.documentElement.getAttribute('data-theme') || 'light';
        var next = current === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        updateMeta(next);
        try { localStorage.setItem('theme', next); } catch (e) { /* ignore */ }
      });
    })();
  </script>
